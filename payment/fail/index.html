<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Оплата не завершена — YOLOOK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="checkout-page">
    <main class="order-modal checkout-main">
      <section class="order-modal-dialog checkout-dialog" aria-labelledby="paymentFailTitle">
        <a class="order-modal-close" href="../../checkout.html" aria-label="Вернуться к оформлению">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5l14 14"></path>
            <path d="M19 5 5 19"></path>
          </svg>
        </a>

        <div class="order-modal-shell">
          <a class="order-modal-brand" href="../../index.html">YOLOOK</a>
          <div class="hero-accent order-modal-accent" aria-hidden="true">
            <span class="accent-line accent-line-blue"></span>
            <span class="accent-line accent-line-pink"></span>
          </div>

          <p class="order-modal-product-line">
            <span class="order-modal-product-name">EXPRESS PAY</span>
            <span class="order-modal-product-price">YOLOOK</span>
          </p>

          <h1 class="order-modal-title" id="paymentFailTitle">ОПЛАТА НЕ ЗАВЕРШЕНА</h1>
          <p class="order-modal-description" data-payment-return-message>
            Похоже, оплата была отменена или не завершилась. Вы можете вернуться к оформлению и повторить попытку, а если нужна помощь, напишите нам в Instagram.
          </p>

          <div class="delivery-policy">
            <span class="delivery-policy-label">Статус заказа</span>
            <strong class="delivery-policy-value" data-payment-return-status>Оплата не подтверждена</strong>
          </div>

          <p class="order-form-status" data-payment-return-error aria-live="polite"></p>

          <div class="order-form-actions">
            <a class="order-submit-button" href="../../checkout.html"><span>ПОВТОРИТЬ ОПЛАТУ</span></a>
            <a class="order-cancel-button checkout-back-link" href="../../cart.html">В корзину</a>
          </div>
        </div>
      </section>
    </main>

    <script src="../../payment-return.js"></script>
  </body>
</html>
